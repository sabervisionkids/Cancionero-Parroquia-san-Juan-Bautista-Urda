<div data-app style="height:100dvh;display:flex;flex-direction:column;font-family:'EB Garamond',Georgia,serif;overflow:hidden;background:var(--ct-bg-app,#8a8078);padding-left:env(safe-area-inset-left,0px);padding-right:env(safe-area-inset-right,0px);">

  <sc-if value="{{ menuVisible }}" hint-placeholder-val="{{ true }}">
    <div data-toolbar style="flex:0 0 auto;color:#fff;display:flex;flex-wrap:nowrap;align-items:center;justify-content:center;gap:4px 6px;padding:5px 46px 5px 10px;background:var(--ct-bg-toolbar,#8B1A1A);overflow-x:auto;">

      <div style="display:inline-flex;align-items:center;gap:3px;background:rgba(0,0,0,.22);border-radius:7px;padding:2px 7px;flex-shrink:0;">
        <span style="font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;margin-right:1px;white-space:nowrap;">Cifrado</span>
        <button onClick="{{ setAnglo }}" style="{{ stAnglo }}">C</button>
        <button onClick="{{ setLatino }}" style="{{ stLatino }}">Do</button>
      </div>
      <div style="display:inline-flex;align-items:center;gap:3px;background:rgba(0,0,0,.22);border-radius:7px;padding:2px 7px;flex-shrink:0;">
        <span style="font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;margin-right:1px;white-space:nowrap;">Apariencia</span>

        <button onClick="{{ setAuto }}" style="{{ stAuto }}">Auto</button>
        <button onClick="{{ setDark }}" style="{{ stDark }}">Oscuro</button>

      <div style="display:inline-flex;align-items:center;gap:3px;background:rgba(0,0,0,.22);border-radius:7px;padding:2px 7px;flex-shrink:0;">

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { sem:0, acc:'sharp', notation:'anglo', scale:1, menuHidden:false, darkMode:'light', wakeLockOn:false, chordsHidden:false, celebrations:[], celDetail:null, celMode:null, celAdding:null, celSelected:[], celCreating:false, celNewName:'', celRenameId:null, celRenameName:'', celListOpen:false, celDetailId:null, celActiveId:null, cantoralScrollId:null,  personalCapos:{}, songScales:{'alza-la-mirada':1.2,'esto-que-te-doy':1.2,'gloria-aragues':1.2}, songSettings:{}, extraSongs:[], addOpen:false, addText:'', addError:'', ytPlayer:{open:false,videoId:null,url:null,x:20,y:80,embedError:false} };

  // ── Transposición ──────────────────────────────────────────────
  isDark(){ const dm=this.state.darkMode; if(dm==='dark') return true; if(dm==='light') return false; try{return window.matchMedia('(prefers-color-scheme: dark)').matches;}catch(_){return false;} }
  pal(){ const d=this.isDark(); const inCel=!!this.state.celActiveId; return { rojo:d?'#d4726b':'#8B1A1A', negro:d?'#e8e0d0':'#1a1a1a', gris:d?'#9a9080':'#6b6b6b', bg:d?'#1e1b1b':'#F5F0E8', bgApp:d?'#0a0909':'#8a8078', bgScroll:d?'#0d0c0b':'#6b6552', bgToolbar:d?'#2d0d0d':inCel?'#3E5C76':'#8B1A1A' }; }
  cel_enterMode(celId){
    // Save current cantoral position
    const scroll=document.querySelector('[data-scroll]');
    let curId=null;
    if(scroll){
      const pages=[...document.querySelectorAll('[data-page]')];
      const top=scroll.scrollTop;
      let best=null,bestD=Infinity;
      pages.forEach(p=>{ const d=Math.abs(p.offsetTop-top); if(d<bestD){bestD=d;best=p;} });
      curId=(best&&best.id)||null;
    }
    this.setState({celActiveId:celId,cantoralScrollId:curId,celListOpen:false,celDetailId:null});
  }
  cel_exitMode(){
    const savedId=this.state.cantoralScrollId;
    this.setState({celActiveId:null},()=>{
      if(savedId) setTimeout(()=>this.goTo(savedId),50);
    });
  }
  cel_save(cels){ this.setState({celebrations:cels}); try{localStorage.setItem('cantoral_cels',JSON.stringify(cels));}catch(_){} }
  cel_create(){ const n=this.state.celNewName.trim(); if(!n) return; const c={id:'c'+Date.now(),name:n,songs:[]}; const cels=[...this.state.celebrations,c]; this.cel_save(cels); this.setState({celNewName:'',celCreating:false,celDetailId:c.id,celListOpen:false}); }
  cel_delete(id){ if(!confirm('¿Eliminar esta celebración?')) return; const cels=this.state.celebrations.filter(c=>c.id!==id); this.cel_save(cels); this.setState({celDetailId:null,celListOpen:true}); }
  cel_rename(id){ const n=this.state.celRenameName.trim(); if(!n) return; const cels=this.state.celebrations.map(c=>c.id===id?{...c,name:n}:c); this.cel_save(cels); this.setState({celRenameId:null,celRenameName:''}); }
  cel_addSongs(){ const id=this.state.celAdding; if(!id) return; const sel=this.state.celSelected; const cels=this.state.celebrations.map(c=>c.id===id?{...c,songs:[...c.songs,...sel.filter(s=>!c.songs.includes(s))]}:c); this.cel_save(cels); this.setState({celAdding:null,celSelected:[]}); }
  cel_removeSong(celId,idx){ const cels=this.state.celebrations.map(c=>c.id===celId?{...c,songs:c.songs.filter((_,i)=>i!==idx)}:c); this.cel_save(cels); }
  cel_moveSong(celId,idx,delta){ const cels=this.state.celebrations.map(c=>{ if(c.id!==celId) return c; const s=[...c.songs]; const ni=idx+delta; if(ni<0||ni>=s.length) return c; [s[idx],s[ni]]=[s[ni],s[idx]]; return {...c,songs:s}; }); this.cel_save(cels); }
  cel_dupSong(celId,idx){ const cels=this.state.celebrations.map(c=>{ if(c.id!==celId) return c; const s=[...c.songs]; s.splice(idx+1,0,s[idx]); return {...c,songs:s}; }); this.cel_save(cels); }
  cel_toggleSel(id){ const sel=this.state.celSelected; this.setState({celSelected:sel.includes(id)?sel.filter(s=>s!==id):[...sel,id]}); }
  cel_startMode(celId){ const cel=this.state.celebrations.find(c=>c.id===celId); if(!cel||!cel.songs.length) return; this.cel_enterMode(celId); setTimeout(()=>this.goTo(cel.songs[0]),80); }
  cel_next(){ const {celActiveId,celebrations}=this.state; if(!celActiveId) return; const cel=celebrations.find(c=>c.id===celActiveId); if(!cel) return; const scroll=document.querySelector('[data-scroll]'); const curTop=scroll?scroll.scrollTop:0; const pages=[...document.querySelectorAll('[data-page]')]; let curIdx=0; pages.forEach((p,i)=>{ if(Math.abs(p.offsetTop-curTop)<10) curIdx=i; }); const ni=curIdx+1; if(ni>=pages.length) return; this.goTo(pages[ni].id||cel.songs[ni]||cel.songs[cel.songs.length-1]); }
  cel_prev(){ const {celActiveId,celebrations}=this.state; if(!celActiveId) return; const cel=celebrations.find(c=>c.id===celActiveId); if(!cel) return; const scroll=document.querySelector('[data-scroll]'); const curTop=scroll?scroll.scrollTop:0; const pages=[...document.querySelectorAll('[data-page]')]; let curIdx=0; pages.forEach((p,i)=>{ if(Math.abs(p.offsetTop-curTop)<10) curIdx=i; }); const ni=Math.max(0,curIdx-1); if(ni===curIdx) return; this.goTo(pages[ni].id||cel.songs[0]); }
  cel_exit(){ this.cel_exitMode(); }

  _setPref(patch){
    this.setState(patch,()=>{
      const {sem,acc,notation,scale,darkMode,chordsHidden}=this.state;
      try{localStorage.setItem('cantoral_prefs',JSON.stringify({sem,acc,notation,scale,darkMode,chordsHidden}));}catch(_){}
    });
  }
  _tgStyle(active){ return 'background:'+(active?'rgba(255,255,255,.28)':'none')+';border:none;color:#fff;border-radius:4px;padding:2px 7px;font-size:11px;font-family:\'EB Garamond\',serif;cursor:pointer;font-weight:'+(active?700:400)+';line-height:1.3;letter-spacing:.3px;white-space:nowrap;'; }

  toggleDarkMode(){ const order=['auto','light','dark']; const i=order.indexOf(this.state.darkMode); const next=order[(i+1)%3]; this.setState({darkMode:next}); }
  toggleWakeLock(){ if(this.state.wakeLockOn){ if(this._wakeLock){this._wakeLock.release();this._wakeLock=null;} this.setState({wakeLockOn:false}); } else { this.requestWakeLock(); } }
  requestWakeLock(){ if(!navigator.wakeLock) return; navigator.wakeLock.request('screen').then(wl=>{ this._wakeLock=wl; wl.addEventListener('release',()=>{this._wakeLock=null;this.setState({wakeLockOn:false});}); this.setState({wakeLockOn:true}); }).catch(()=>{}); }
  tables(){ return { AS:['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'], AF:['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'], LS:['Do','Do#','Re','Re#','Mi','Fa','Fa#','Sol','Sol#','La','La#','Si'], LF:['Do','Reb','Re','Mib','Mi','Fa','Solb','Sol','Lab','La','Sib','Si'] }; }
  idx(){ if(this._idx) return this._idx; const t=this.tables(),IDX={}; [t.AS,t.AF,t.LS,t.LF].forEach(a=>a.forEach((n,i)=>{ if(!(n in IDX)) IDX[n]=i%12; })); this._idx=IDX; return IDX; }
  note(i,acc,notation){ i=((i%12)+12)%12; const t=this.tables(); const a=acc||this.state.acc; const n=notation||this.state.notation; return n==='anglo'?(a==='sharp'?t.AS[i]:t.AF[i]):(a==='sharp'?t.LS[i]:t.LF[i]); }
  parseRoot(c){ const IDX=this.idx(); for(let l=Math.min(4,c.length);l>=1;l--){ const r=c.slice(0,l); if(r in IDX) return [r,c.slice(l)]; } return [null,c]; }
  trans(c){ const IDX=this.idx(); const sem=this._rSem!==undefined?this._rSem:this.state.sem; const acc=this._rAcc!==undefined?this._rAcc:this.state.acc; return String(c).split('/').map(p=>{ const [r,s]=this.parseRoot(p); if(r===null) return p; return this.note((IDX[r]+sem+12)%12,acc)+s; }).join('/'); }

  // ── Parser ChordPro ────────────────────────────────────────────
  parseChordLine(line){
    const parts=line.split(/(\[[^\]]*\])/);
    const rawSegs=[];let cur=null;
    for(const p of parts){
      if(/^\[[^\]]*\]$/.test(p)){cur=p.slice(1,-1);}
      else if(p!==''){rawSegs.push([cur,p]);cur=null;}
    }
    if(cur!==null) rawSegs.push([cur,'']);
    if(!rawSegs.length) rawSegs.push([null,'']);
    // Split each raw segment at word boundaries so each chord aligns to its own syllable
    const segs=[];
    for(const [chord,text] of rawSegs){
      const words=text.match(/\S+\s*|\s+/g)||[text];
      if(words.length<=1||text.startsWith('>>')){segs.push([chord,text]);continue;}
      segs.push([chord,words[0]]);
      for(let i=1;i<words.length;i++) segs.push([null,words[i]]);
    }
    return segs;
  }

  parseChordPro(raw){
    const lines=raw.trim().split('\n');
    const res={title:'',section:'',meta:'',artist:'',number:0,columns:0,youtube:'',blocks:[]};
    let block=null,seenTitle=false,pendingBreak=false;
    const flush=()=>{ if(block&&block.lines.length) res.blocks.push(block); block=null; };
    for(const rawLine of lines){
      const line=rawLine.trim();
      if(line.startsWith('{')&&line.endsWith('}')){
        const inner=line.slice(1,-1),ci=inner.indexOf(':');
        const k=(ci>=0?inner.slice(0,ci):inner).trim().toLowerCase();
        const v=ci>=0?inner.slice(ci+1).trim():'';
        if(k==='title'){ if(!seenTitle){res.title=v;seenTitle=true;}else res.section=v; }
        else if(k==='section') res.section=v;
        else if(k==='number') res.number=parseInt(v)||0;
        else if(k==='capo'||k==='cejilla') res.meta=v?('Cejilla original: '+v):'';
        else if(k==='columns') res.columns=parseInt(v)||0;
        else if(k==='youtube') res.youtube=v;
        else if(k==='artist'||k==='autor'||k==='author'||k==='subtitle') res.artist=v;
        else if(k==='column_break'||k==='colbreak'||k==='new_column'){ pendingBreak=true; }
        else if(k==='start_of_chorus'){ flush(); block={type:'lines',isChorus:true,label:'',lines:[],colBreak:pendingBreak}; pendingBreak=false; }
        else if(k==='end_of_chorus'||k==='end_of_verse'||k==='end_of_tab'||k==='end_of_bridge'||k==='end_of_outro'){ flush(); }
        else if(k==='start_of_verse'||k==='start_of_tab'||k==='start_of_bridge'||k==='start_of_outro'){ flush(); block={type:'lines',isChorus:false,label:v,lines:[],colBreak:pendingBreak}; pendingBreak=false; }
        continue;
      }
      if(!line){ flush(); continue; }
      if(!block) block={type:'lines',isChorus:false,lines:[]};
      block.lines.push(this.parseChordLine(line));
    }
    flush();
    return res;
  }

  // ── Renderizado ────────────────────────────────────────────────
  renderLine(segsRaw,key,isChorus,scale,hideChords){
    const R=React.createElement,rojo='#8B1A1A',negro='#1a1a1a';
    // Chord-only line (intro/outro marker): render compactly
    const isChordOnly=segsRaw.every(s=>!(s[1]||'').trim());
    if(isChordOnly){
      return R('div',{key,style:{color:hideChords?'transparent':rojo,fontWeight:700,fontSize:'0.82em',letterSpacing:'0.04em',marginBottom:'0.4em',whiteSpace:'nowrap'}},
        segsRaw.filter(s=>s[0]).map((s,i)=>R('span',{key:i,style:{marginRight:'0.5em'}},this.trans(s[0])))
      );
    }
    const hasAnyChord=segsRaw.some(s=>s[0]);
    // Second-voice line: first segment starts with >>
    if(segsRaw[0]&&(String(segsRaw[0][1]||'')).startsWith('>>')){
      const raw=String(segsRaw[0][1]).slice(2);
      const explicit=raw.match(/^(\d+(?:\.\d+)?)ch\s*/);
      let paddingCh, visSegs;
      if(explicit){
        paddingCh=parseFloat(explicit[1]);
        if(segsRaw.length>1){ visSegs=segsRaw.slice(1); }
        else{ const rem=raw.slice(explicit[0].length); visSegs=[[null,rem]]; }
      } else {
        const ht=(raw.replace(/ +$/,m=>'\u00A0'.repeat(m.length)))||'\u00A0';
        paddingCh=Math.round(ht.replace(/\u00A0/g,' ').length*0.72);
        visSegs=segsRaw.slice(1);
      }
      const visHasChord=visSegs.some(s=>s[0]);
      const visKids=visSegs.map((s,i)=>{
        const chord=s[0]?this.trans(s[0]):null;
        const lyric=(String(s[1])||'').replace(/ +$/,m=>'\u00A0'.repeat(m.length))||'\u00A0';
        return R('span',{key:i,style:{display:'inline-flex',flexDirection:'column',alignItems:'flex-start',verticalAlign:'bottom',whiteSpace:'nowrap'}},
          visHasChord?R('span',{style:{color:chord?rojo:'transparent',fontWeight:700,fontSize:'0.82em',lineHeight:'1.15',whiteSpace:'nowrap',minHeight:'1em'}},chord||'\u00A0'):null,
          R('span',{style:{fontWeight:'normal',lineHeight:'1.45',letterSpacing:'0.02em',whiteSpace:'nowrap'}},lyric)
        );
      });
      return R('div',{key,style:{color:negro,marginBottom:'0.5em',lineHeight:'1',whiteSpace:'nowrap',paddingLeft:paddingCh+'ch'}},visKids);
    }
    const segs=this._padSegments(segsRaw);
    const kids=segs.map((s,i)=>{
      const chord=s[0]?this.trans(s[0]):null;
      let lyric=(String(s[1])||'').replace(/ +$/,m=>'\u00A0'.repeat(m.length))||'\u00A0';
      const isHidden=lyric.startsWith('>>');
      if(isHidden) lyric=lyric.slice(2)||'\u00A0';
      // inline-flex column: chord row on top, lyric below — width = max(chord,lyric), no overflow
      return R('span',{key:i,style:{display:'inline-flex',flexDirection:'column',alignItems:'flex-start',verticalAlign:'bottom',whiteSpace:'nowrap'}},
        hasAnyChord?R('span',{style:{color:isHidden||hideChords?'transparent':(chord?rojo:'transparent'),fontWeight:700,fontSize:'0.82em',lineHeight:'1.15',whiteSpace:'nowrap',minHeight:'1em'}},chord||'\u00A0'):null,
        R('span',{style:{fontWeight:isChorus?700:'normal',lineHeight:'1.45',letterSpacing:'0.02em',whiteSpace:'nowrap',color:isHidden?'transparent':undefined}},lyric)
      );
    });
    return R('div',{key,style:{color:negro,marginBottom:'0.5em',lineHeight:'1',whiteSpace:'nowrap'}},kids);
  }

  // ── Chord spacing ─────────────────────────────────────────────
  // Approximate ratio: chord chars at 0.82em bold vs lyric chars at 1em normal
  // Bold glyphs are ~15% wider; 0.82 * 1.15 ≈ 0.94 → each chord char ≈ 0.94 lyric char
  _findSyllableSplit(word){
    const vowels='aeiouáéíóúüAEIOUÁÉÍÓÚÜ';
    const isV=c=>vowels.includes(c);
    // Prefer existing hyphen
    const hyphenIdx=word.indexOf('-');
    if(hyphenIdx>0&&hyphenIdx<word.length-1) return hyphenIdx+1;
    // VCV → split before C: a-mor, u-na
    for(let i=word.length-2;i>=2;i--){
      if(isV(word[i-2])&&!isV(word[i-1])&&isV(word[i])) return i-1;
    }
    // VCCV → split between CC: can-to
    for(let i=word.length-2;i>=2;i--){
      if(isV(word[i-2])&&!isV(word[i-1])&&!isV(word[i])&&isV(word[i+1])) return i;
    }
    // Any after vowel
    for(let i=word.length-1;i>=1;i--){
      if(isV(word[i-1])) return i;
    }
    return -1;
  }

  _padSegments(segs){
    const RATIO=0.94;
    const vis=s=>String(s||'').replace(/\u00A0/g,' ');
    const out=segs.map(s=>[s[0],String(s[1]||'')]);
    for(let i=0;i<out.length;i++){
      const [chord,lyric]=out[i];
      if(!chord) continue;
      const chordW=this.trans(chord).length*RATIO;
      const lyricW=vis(lyric).length;
      const deficit=Math.ceil(chordW-lyricW);
      if(deficit<=0) continue;
      const lv=vis(lyric);
      // Check if lyric ends at a word boundary
      const atBoundary=/[\s,.\-!?;:]$/.test(lv)||!lv.trim();
      if(atBoundary){
        // Add NBSP at the end (inter-word space)
        out[i][1]=lyric+'\u00A0'.repeat(deficit);
      } else {
        // Mid-word: try to hyphenate
        const splitIdx=this._findSyllableSplit(lv.trimEnd());
        if(splitIdx>0&&splitIdx<lv.trimEnd().length){
          const w=lv.trimEnd();
          const before=w.slice(0,splitIdx)+'-';
          const moved=w.slice(splitIdx);
          out[i][1]=before;
          if(i+1<out.length){
            out[i+1][1]=moved+out[i+1][1];
          }
        } else {
          out[i][1]=lyric+'\u00A0'.repeat(deficit);
        }
      }
    }
    return out;
  }

  renderBlock(b,key,hideChords){
    const R=React.createElement,{gris,negro}=this.pal();
    const lines=b.lines.map((ln,j)=>this.renderLine(ln,'ln'+j,b.isChorus,undefined,hideChords));
    return R('div',{key,style:{marginBottom:'1.4em',breakInside:'avoid',breakBefore:'avoid'}},...lines);
  }

  extractYtId(url){
    if(!url) return null;
    const m=url.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);
    return m?m[1]:null;
  }

  openYtPlayer(url){
    const videoId=this.extractYtId(url);
    if(!videoId) return;
    this.setState(s=>({ytPlayer:{...s.ytPlayer,open:true,videoId,url,embedError:false}}));
  }

    this.setState(s=>({ytPlayer:{...s.ytPlayer,open:false,videoId:null}}));

  renderYtPlayer(){
    const R=React.createElement;
    const {ytPlayer}=this.state;
    if(!ytPlayer.open||!ytPlayer.videoId) return null;
    const {videoId,url,x,y,embedError}=ytPlayer;
    const rojo='#8B1A1A';

    const startDrag=(e)=>{
      e.preventDefault();
      const cx0=e.touches?e.touches[0].clientX:e.clientX;
      const cy0=e.touches?e.touches[0].clientY:e.clientY;
      const ox=cx0-this.state.ytPlayer.x, oy=cy0-this.state.ytPlayer.y;
      const move=(ev)=>{
        const cx=ev.touches?ev.touches[0].clientX:ev.clientX;
        const cy=ev.touches?ev.touches[0].clientY:ev.clientY;
        this.setState(s=>({ytPlayer:{...s.ytPlayer,x:cx-ox,y:cy-oy}}));
      };
      const up=()=>{
        document.removeEventListener('mousemove',move);
        document.removeEventListener('mouseup',up);
        document.removeEventListener('touchmove',move);
        document.removeEventListener('touchend',up);
      };
      document.addEventListener('mousemove',move);
      document.addEventListener('mouseup',up);
      document.addEventListener('touchmove',move,{passive:false});
      document.addEventListener('touchend',up);
    };

    const embedUrl='https://www.youtube.com/embed/'+videoId+'?autoplay=1&enablejsapi=1';

    return R('div',{style:{position:'fixed',left:Math.max(0,x)+'px',top:Math.max(0,y)+'px',zIndex:1000,background:'#111',borderRadius:'12px',boxShadow:'0 8px 40px rgba(0,0,0,.7)',overflow:'hidden',width:'360px',userSelect:'none',fontFamily:"'EB Garamond',serif"}},
      R('div',{
        onMouseDown:startDrag,onTouchStart:startDrag,
        style:{background:rojo,padding:'8px 10px',display:'flex',alignItems:'center',gap:'8px',cursor:'grab'}
      },
        R('span',{style:{color:'rgba(255,255,255,.7)',fontSize:'15px',lineHeight:1}},'▶'),
        R('span',{style:{color:'#fff',fontSize:'13px',fontWeight:700,letterSpacing:'.6px',textTransform:'uppercase',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',userSelect:'none'}},'YouTube'),
        R('button',{
          onClick:()=>this.closeYtPlayer(),
          style:{background:'rgba(0,0,0,.25)',border:'none',color:'#fff',cursor:'pointer',fontSize:'15px',lineHeight:1,width:'24px',height:'24px',borderRadius:'4px',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',padding:0}
        },'✕')
      ),
      embedError
        ?R('div',{style:{padding:'32px 24px',textAlign:'center',background:'#1a1a1a'}},
            R('p',{style:{margin:'0 0 20px',fontSize:'15px',lineHeight:1.6,color:'#bbb',fontFamily:"'EB Garamond',serif"}},'Este vídeo no permite la reproducción integrada.'),
            R('a',{href:url,target:'_blank',rel:'noopener',style:{display:'inline-flex',alignItems:'center',gap:'8px',background:'#FF0000',color:'#fff',borderRadius:'7px',padding:'10px 22px',textDecoration:'none',fontSize:'14px',fontWeight:700,letterSpacing:'.3px',fontFamily:"'EB Garamond',serif"}},'▶  Abrir en YouTube')
          )
        :R('iframe',{
            key:'yt-'+videoId,
            src:embedUrl,
            allow:'autoplay; encrypted-media; fullscreen; picture-in-picture',
            allowFullScreen:true,
            style:{display:'block',width:'360px',height:'202px',border:'none'}

  // ── Gestión de canciones extra ─────────────────────────────────
  addSong(){
    const text=this.state.addText.trim();
    if(!text){this.setState({addError:'El campo está vacío.'});return;}
    const parsed=this.parseChordPro(text);
    if(!parsed.title){this.setState({addError:'Falta el título: {title: Nombre de la canción}'});return;}
    if(!parsed.section){this.setState({addError:'Falta la sección: {section: Cantos de entrada}'});return;}
    const id=parsed.title.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    const song={id,chordpro:text};
    const extra=[...this.state.extraSongs.filter(s=>s.id!==id),song];
    this.setState({extraSongs:extra,addOpen:false,addText:'',addError:''});
    try{localStorage.setItem('cantoral_extra',JSON.stringify(extra));}catch(_){}
  }

  removeExtraSong(id){
    const extra=this.state.extraSongs.filter(s=>s.id!==id);
    this.setState({extraSongs:extra});
    try{localStorage.setItem('cantoral_extra',JSON.stringify(extra));}catch(_){}
  }

  renderSong(song){
    const R=React.createElement,{rojo,negro,gris,bg}=this.pal();
    const pad='22px 52px';
    const hideChords=this.state.chordsHidden;
    const personalCapo=(this.state.personalCapos[song.id]!==undefined&&this.state.personalCapos[song.id]!==null)?this.state.personalCapos[song.id]:0;
    const setPersonalCapo=(n)=>{
      const capos={...this.state.personalCapos,[song.id]:n};
      this.setState({personalCapos:capos});
      try{localStorage.setItem('cantoral_capos',JSON.stringify(capos));}catch(_){}
    };
    const btnSt={background:'rgba(0,0,0,.06)',border:'1px solid rgba(0,0,0,.12)',color:'#555',borderRadius:'4px',width:'22px',height:'22px',display:'flex',alignItems:'center',justifyContent:'center',fontStyle:'normal',cursor:'pointer',fontSize:'14px',lineHeight:1,fontFamily:'inherit',padding:0};

        const cur=((s.songScales||{})[song.id])||1;
        const next=Math.max(0.5,Math.min(2.5,+(cur+delta).toFixed(2)));
        const scales={...s.songScales,[song.id]:next};
        try{localStorage.setItem('cantoral_scales',JSON.stringify(scales));}catch(_){}

      });

    const songSt=this.state.songSettings[song.id]||{};

      try{localStorage.setItem('cantoral_song_settings',JSON.stringify(next));}catch(_){}
    };
    const semLabel=songSem===0?'0':(songSem>0?'+'+songSem:''+songSem);
    const grayActive={background:'#555',color:'#fff',border:'1px solid #444'};

      R('button',{onClick:()=>setPersonalCapo(Math.min(11,personalCapo+1)),style:btnSt},'+'),

      R('button',{onClick:()=>setSongSetting({acc:'sharp'}),style:{...tgAcc('sharp'),marginLeft:'4px',fontFamily:'system-ui',lineHeight:1}},'\u266f'),
      R('button',{onClick:()=>setSongSetting({acc:'flat'}),style:{...tgAcc('flat'),fontFamily:'system-ui',lineHeight:1}},'\u266d'),

        R('div',{style:{flex:'1 1 0',minWidth:0,overflow:'hidden'}},_right.map((b,i)=>this.renderBlock(b,'br'+i,hideChords)))

  // ── Navegación y escala ────────────────────────────────────────
  goTo(id){
    const c=document.querySelector('[data-scroll]');
    if(!c) return;
    const top=this._scrollTop&&this._scrollTop[id];
    if(top!=null) c.scrollTo({top,behavior:'smooth'});
  }

  // Envuelve cada página: contenedor al tamaño escalado real (var --page-w/-h),
  // con la sección interior fija a 794×1123 escalada por transform (barato).
  // content-visibility:auto hace que el navegador omita el layout/paint de las
  // páginas fuera de pantalla → nada de cuelgues aunque haya 60 páginas.
  wrapPage(node){
    const R=React.createElement;
    if(Array.isArray(node)) return node.map(n=>this.wrapPage(n));
    if(!node||!node.props) return node;
    const p=node.props;
    const id=p.id||null, songId=p['data-song-id']||null;
    const inner=React.cloneElement(node,{
      'data-page':null, id:null, 'data-song-id':null,
      style:{...(p.style||{}),width:'794px',height:'1123px',margin:0,flexShrink:0,
        transform:'scale(var(--page-zoom,1))',transformOrigin:'top left'}
    });
    const w={key:(node.key||'p')+'-w','data-page':'1',style:{
      width:'var(--page-w,794px)',height:'var(--page-h,1123px)',margin:'0 auto 14px',
      overflow:'hidden',contentVisibility:'auto',
      containIntrinsicSize:'var(--page-w,794px) var(--page-h,1123px)',flexShrink:0}};
    if(id) w.id=id;
    if(songId) w['data-song-id']=songId;
    return R('div',w,inner);
  }

  applyPageScale(){
    const c=document.querySelector('[data-scroll]');
    if(!c) return;
    // Única responsabilidad: calcular escala y escribir CSS vars (sin reflows caros).
    this._scrollTop={};
    const scale=Math.min(c.clientHeight/1123,c.clientWidth/794);
    const scaledW=Math.round(794*scale);
    const scaledH=Math.round(1123*scale);
    const rs=document.documentElement.style;
    rs.setProperty('--page-zoom',String(scale));   // transform:scale() en el interior
    rs.setProperty('--page-w',scaledW+'px');        // tamaño real del contenedor de página
    rs.setProperty('--page-h',scaledH+'px');
    const sidePad=Math.max(8,Math.floor((c.clientWidth-scaledW)/2));
    rs.setProperty('--page-side-pad',sidePad+'px');
    // Offsets para navegación programática. Las páginas son de altura uniforme
    // (var --page-h + 14px de margen), así que los calculamos por posición SIN
    // leer offsetTop: leer offsetTop de elementos content-visibility fuerza su
    // layout y anularía la optimización (colgaba el móvil).
    const step=scaledH+14;
    let cum=0;
    document.querySelectorAll('[data-scroll] > [data-page]').forEach(p=>{ if(p.id) this._scrollTop[p.id]=cum; cum+=step; });
    // NOTA: el tamaño de letra de cada canto se calcula de forma ANALÍTICA en
    // renderSong -> estimateFontSize (sin tocar el DOM).
    // Las páginas se escalan con transform:scale() (compositor, coste casi nulo)
    // en vez de la propiedad `zoom`, que forzaba un relayout gigante al entrar
    // cada página escalada en pantalla y colgaba el móvil >10 s.
  }

  scheduleFit(){
    if(this._raf) cancelAnimationFrame(this._raf);
    this._raf=requestAnimationFrame(()=>{ this._raf=null; this.applyPageScale(); });
  }

  // ── Helpers de columnas ───────────────────────────────────────
  // Altura estimada en em de una lista de bloques
  blockEms(blist){
    let t=0;
    for(const b of blist){
      for(const line of b.lines) t+=line.some(s=>s[0])?2.9:1.95;
      t+=1.5;
    }
    return t;
  }

  // Split óptimo: columna izquierda ≥ derecha, mínima diferencia posible
  bestColSplit(blocks){
    if(blocks.length<=1) return 1;
    const forced=blocks.findIndex((b,i)=>i>0&&b.colBreak);
    if(forced>0) return forced;
    const heights=blocks.map(b=>this.blockEms([b]));
    const total=heights.reduce((a,x)=>a+x,0);
    let cumLeft=0, bestSplit=Math.ceil(blocks.length/2), bestDiff=Infinity, bestValid=false;
    for(let i=1;i<blocks.length;i++){
      cumLeft+=heights[i-1];
      const cumRight=total-cumLeft;
      const diff=Math.abs(cumLeft-cumRight);
      const valid=cumLeft>=cumRight; // izquierda >= derecha
      if(!bestValid&&valid){ bestValid=true; bestSplit=i; bestDiff=diff; }
      else if(bestValid&&valid&&diff<=bestDiff){ bestSplit=i; bestDiff=diff; }
      else if(!bestValid&&!valid&&diff<bestDiff){ bestSplit=i; bestDiff=diff; }
    }
    return bestSplit;
  }

  // Tamaño de fuente estimado por altura (la corrección horizontal se hace en applyPageScale)
  estimateFontSize(blocks, isDouble, songScale){
    const scale=this._vpScale||1;
    const availH=Math.round(1123*scale)*0.82;
    let maxEms;
    if(isDouble){
      const split=this.bestColSplit(blocks);
      maxEms=Math.max(this.blockEms(blocks.slice(0,split)), this.blockEms(blocks.slice(split)));
    } else {
      maxEms=this.blockEms(blocks);
    }
    if(maxEms<=0) return 24;
    return Math.max(12,Math.min(56,Math.round((availH/maxEms)*(songScale||1)*0.99)));
  }

      const defsp=this.sectionDefs();
      const bySectionP={};
      list.forEach(s=>{if(!bySectionP[s.section])bySectionP[s.section]=[];bySectionP[s.section].push(s);});
      defsp.forEach((def,i)=>{
        pages.push({el:this.renderSection(def.name,def.subtitle,'sec'+i)});
        (bySectionP[def.name]||[]).forEach((s,si)=>{ const st=this.state.songSettings[s.id]||{}; this._rSem=st.sem!==undefined?st.sem:0; this._rAcc=st.acc||'sharp'; pages.push({el:this.renderSong({...s,sectionPage:si+1})}); this._rSem=undefined; this._rAcc=undefined; });
      });
    }

    const wrappedPages=pages.map(p=>({el:this.wrapPage(p.el)}));

    return {
      menuVisible:!menuHidden,
      toggleLabel:menuHidden?'\u25BC Men\u00FA':'\u25B2 Men\u00FA',
      svLabel:sem===0?'0':(sem>0?'+'+sem:''+sem),
      stSharp:tg(acc==='sharp'),stFlat:tg(acc==='flat'),
      stAnglo:tg(notation==='anglo'),stLatino:tg(notation==='latino'),
      transposeUp:()=>this._setPref(s=>({sem:Math.min(11,s.sem+1)})),
      transposeDown:()=>this._setPref(s=>({sem:Math.max(-11,s.sem-1)})),
      setSharp:()=>this._setPref({acc:'sharp'}),setFlat:()=>this._setPref({acc:'flat'}),
      setAnglo:()=>this._setPref({notation:'anglo'}),setLatino:()=>this._setPref({notation:'latino'}),
      fontUp:()=>this._setPref(s=>({scale:Math.min(1.3,+(s.scale+0.07).toFixed(2))})),
      fontDown:()=>this._setPref(s=>({scale:Math.max(0.7,+(s.scale-0.07).toFixed(2))})),

      toggleMenu:()=>this.setState(s=>({menuHidden:!s.menuHidden})),
      toggleDark:()=>this.toggleDarkMode(),
      setLight:()=>this._setPref({darkMode:'light'}),
      setAuto:()=>this._setPref({darkMode:'auto'}),
      setDark:()=>this._setPref({darkMode:'dark'}),
      stLight:this._tgStyle(this.state.darkMode==='light'),
      stAuto:this._tgStyle(this.state.darkMode==='auto'),
      stDark:this._tgStyle(this.state.darkMode==='dark'),
      showChords:()=>this.setState({chordsHidden:false}),
      hideChords:()=>this.setState({chordsHidden:true}),
      stShowChords:this._tgStyle(!this.state.chordsHidden),
      stHideChords:this._tgStyle(this.state.chordsHidden),
      toggleChords:()=>this.setState(s=>({chordsHidden:!s.chordsHidden})),
      chordsLabel:this.state.chordsHidden?'Con acordes':'Solo letra',
      darkLabel:this.state.darkMode==='auto'?'Auto':this.state.darkMode==='light'?'Día':'Noche',
      celSongSelector:this.renderSongSelector(),
      celListOverlay:this.renderCelebrationsList(),
      celDetailOverlay:this.renderCelebrationDetail(),
      goCelList:()=>this.setState({celListOpen:true,celDetailId:null}),
      inCelebration:!!this.state.celActiveId,
      notInCelebration:!this.state.celActiveId,
      celName:this.state.celActiveId?(this.state.celebrations.find(c=>c.id===this.state.celActiveId)||{}).name||'':'',
      exitCelebration:()=>this.cel_exitMode(),
      toggleWakeLock:()=>this.toggleWakeLock(),
      wakeLockLabel:this.state.wakeLockOn?'🔆 ON':'🔆 OFF',
      bgApp:this.pal().bgApp,
      bgScroll:this.pal().bgScroll,
      bgToolbar:this.pal().bgToolbar,
      ytPlayerEl:this.renderYtPlayer(),
      pages:wrappedPages
    };
  }
}
</script>
</body>
</html>
